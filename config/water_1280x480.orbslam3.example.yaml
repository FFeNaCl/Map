%YAML:1.0

# Copy the underwater camera_calibration result here before running ORB-SLAM3.
# Replace all xxx values with values from ost.yaml.

Camera.type: "PinHole"
Camera.fx: xxx
Camera.fy: xxx
Camera.cx: xxx
Camera.cy: xxx

Camera.k1: xxx
Camera.k2: xxx
Camera.p1: xxx
Camera.p2: xxx
Camera.k3: xxx

Camera.width: 1280
Camera.height: 480
Camera.fps: 30.0
Camera.RGB: 1

# Underwater scenes are low-texture. These values are a starting point only.
ORBextractor.nFeatures: 1600
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 12
ORBextractor.minThFAST: 5

Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
